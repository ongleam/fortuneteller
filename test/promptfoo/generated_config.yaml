description: Auto-generated promptfoo config for testing multiple system prompts using tsx
tags:
  version: v1
evaluateOptions:
  maxConcurrency: 5
  delay: 500000
providers:
  - id: http
    label: BASELINE
    config:
      url: http://localhost:3000/api/test-chat
      method: POST
      headers:
        Content-Type: application/json
      body:
        message:
          id: msg-{{N}}-baseline
          createdAt: '{{date}}'
          role: user
          content: '{{question}}'
        selectedChatModel: chat-model
        systemPromptId: BASELINE
      transformResponse: |-
        {output: json.output, 
        tokenUsage: {
          total: json.tokenUsage.total,
          prompt: json.tokenUsage.prompt,
          completion: json.tokenUsage.completion,
        } }
